name: smart-city-traffic-etl

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
      POSTGRES_MULTIPLE_DATABASES: ${PG_DB},${SUPERSET_DB}

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./utils:/docker-entrypoint-initdb.d

  # -------------------------
  # AIRFLOW INIT
  # -------------------------
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_USER}:${PG_PASSWORD}@postgres/${PG_DB}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    entrypoint: >
     bash -c "
      airflow db upgrade &&
      airflow users create
        --username ${AIRFLOW_ADMIN_USERNAME}
        --password ${AIRFLOW_ADMIN_PASSWORD}
        --firstname ${AIRFLOW_ADMIN_FIRSTNAME}
        --lastname ${AIRFLOW_ADMIN_LASTNAME}
        --role Admin
        --email ${AIRFLOW_ADMIN_EMAIL} || true
      "
  # AIRFLOW WEB
  # -------------------------
  airflow-webserver:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: airflow webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_USER}:${PG_PASSWORD}@postgres/${PG_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      TOMTOM_API_KEY: ${TOMTOM_API_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./utils:/opt/airflow/utils
      - ./logs:/opt/airflow/logs
      - ./data:/opt/data
      - ./spark:/opt/spark-apps
      - ./drivers:/opt/spark/drivers
    entrypoint: >
      bash -c "
      airflow db check &&
      airflow webserver
      "

  # -------------------------
  # AIRFLOW SCHEDULER
  # -------------------------
  airflow-scheduler:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: airflow scheduler
    depends_on:
      - airflow-init
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_USER}:${PG_PASSWORD}@postgres/${PG_DB}
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      TOMTOM_API_KEY: ${TOMTOM_API_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./utils:/opt/airflow/utils
      - ./logs:/opt/airflow/logs
      - ./data:/opt/data
      - ./spark:/opt/spark-apps
      - ./drivers:/opt/spark/drivers
    entrypoint: >
      bash -c "
      airflow db check &&
      airflow scheduler
      "

# SPARK MASTER
# -------------------------
  spark-master:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/data
      - ./drivers:/opt/spark/drivers

  # -------------------------
  # SPARK WORKER
  # -------------------------
  spark-worker:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/data
      - ./drivers:/opt/spark/drivers

  # -------------------------
  # SUPERSET
  # -------------------------
  superset:
    build:
      context: .
      dockerfile: superset/Dockerfile
    depends_on:
      - postgres
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_DB_URI: postgresql+psycopg2://${PG_USER}:${PG_PASSWORD}@postgres:5432/${SUPERSET_DB}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
      - ./superset:/app/pythonpath
    command: >-
      /bin/bash -c "
      superset db upgrade &&
      superset fab create-admin --username $$SUPERSET_ADMIN_USERNAME --firstname $$SUPERSET_ADMIN_FIRSTNAME --lastname $$SUPERSET_ADMIN_LASTNAME --email $$SUPERSET_ADMIN_EMAIL --password $$SUPERSET_ADMIN_PASSWORD || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "
volumes:
  postgres_data:
  superset_home: